clan:
  admin:
    disband:
      success: "<gradient:#ff5252:#ff1744>Clan</gradient> <gold><bold>{clan}</bold></gold> <gradient:#ff5252:#ff1744>has been disbanded.</gradient>"
      not-found: "<red>Clan <gold><bold>{clan}</bold></gold> was not found.</red>"

    transfer:
      success: "<gradient:#00e676:#1de9b6>Clan</gradient> <gold><bold>{clan}</bold></gold> <gradient:#00e676:#1de9b6>ownership has been transferred to</gradient> <gold><bold>{target}</bold></gold>."
      not-found: "<red>Clan <gold><bold>{clan}</bold></gold> was not found.</red>"
      target-not-in-clan: "<gold><bold>{target}</bold></gold> <red>is not a member of that clan.</red>"
      target-is-already-owner: "<gold><bold>{target}</bold></gold> <red>is already the clan owner.</red>"

    kick:
      success: "<gold><bold>{target}</bold></gold> <red>has been kicked from their clan.</red>"
      target-not-in-clan: "<gold><bold>{target}</bold></gold> <red>is not in a clan.</red>"
      cannot-kick-owner: "<red>You cannot kick the <gold><bold>clan owner</bold></gold>.</red>"

    role:
      success: "<gradient:#00e676:#1de9b6>Role of</gradient> <gold><bold>{target}</bold></gold> <gradient:#00e676:#1de9b6>has been changed to <bold>{role}</bold>.</gradient>"
      member-not-found: "<gold><bold>{target}</bold></gold> <red>is not in a clan.</red>"
      already-set: "<gold><bold>{target}</bold></gold> <red>already has that role.</red>"
      cannot-assign-owner-role: "<red>You cannot assign the <gold><bold>owner</bold></gold> role directly.</red>"
      not-found: "<red>That role does not exist.</red>"

    display:
      success: "<gradient:#00e676:#1de9b6>Display name changed to</gradient> {display}."
      not-found: "<red>Clan <gold><bold>{clan}</bold></gold> was not found.</red>"
      invalid-content: "<red>Display name content does not match the original clan name.</red>"
      invalid-characters: "<red>Display name contains <bold>invalid characters</bold>.</red>"

    pvp-mode:
      success: "<gradient:#00e676:#1de9b6>PvP mode of clan</gradient> <gold><bold>{clan}</bold></gold> <gradient:#00e676:#1de9b6>has been set to <bold>{mode}</bold>.</gradient>"
      not-found: "<red>Clan <gold><bold>{clan}</bold></gold> was not found.</red>"
      already-in-mode: "<red>That clan is already in that PvP mode.</red>"
      invalid: "<red>That PvP mode does not exist.</red>"

    invite-state:
      success: "<gradient:#00e676:#1de9b6>Invite state of clan</gradient> <gold><bold>{clan}</bold></gold> <gradient:#00e676:#1de9b6>has been set to <bold>{state}</bold>.</gradient>"
      not-found: "<red>Clan <gold><bold>{clan}</bold></gold> was not found.</red>"
      already-set: "<red>That clan is already in that invite state.</red>"
      invalid: "<red>That invite state does not exist.</red>"

  create:
    success: "<gradient:#00e676:#1de9b6>The clan</gradient> <gold><bold>{clan}</bold></gold> <gradient:#00e676:#1de9b6>has been created successfully.</gradient>"
    already-in-clan: "<red>You are already in a <bold>clan</bold>.</red>"
    name-invalid-characters: "<red>Clan name can only contain <bold>letters and numbers</bold>."
    name-taken: "<red>The clan name <gold><bold>{clan}</bold></gold> is already taken.</red>"
    name-too-short: "<red>Clan name must be at least <gold><bold>{min}</bold></gold> characters.</red>"
    name-too-long: "<red>Clan name must be at most <gold><bold>{max}</bold></gold> characters.</red>"
    cancelled: "<red>Clan creation was cancelled by an external plugin.</red>"

  disband:
    success: "<gradient:#ff5252:#ff1744>The clan</gradient> <gold><bold>{clan}</bold></gold> <gradient:#ff5252:#ff1744>has been disbanded.</gradient>"
    not-in-clan: "<red>You are not in a <bold>clan</bold>.</red>"
    insufficient-role: "<red>You don't have permission to disband the clan.</red>"
    cancelled: "<red>Clan disband was cancelled by an external plugin.</red>"

  leave:
    success: "<yellow>You have left <gold><bold>{clan}</bold></gold>.</yellow>"
    broadcast: "<gold><bold>{player}</bold></gold> <yellow>has left the clan.</yellow>"
    not-in-clan: "<red>You are not in a <bold>clan</bold>.</red>"
    owner-cannot-leave: "<red>You cannot leave your own clan. <gold>Transfer ownership first.</gold></red>"
    cancelled: "<red>You couldn't leave the clan. Cancelled by an external plugin.</red>"

  kick:
    success: "<gold><bold>{target}</bold></gold> <yellow>has been kicked from the clan.</yellow>"
    kicked: "<red>You have been kicked from <gold><bold>{clan}</bold></gold>.</red>"
    broadcast: "<gold><bold>{target}</bold></gold> <red>has been kicked from the clan.</red>"
    not-in-clan: "<red>You are not in a <bold>clan</bold>.</red>"
    target-not-in-clan: "<gold><bold>{target}</bold></gold> <red>is not in your clan.</red>"
    insufficient-role: "<red>You don't have permission to kick members.</red>"
    cannot-kick-owner: "<red>You cannot kick the <gold><bold>clan owner</bold></gold>.</red>"
    cannot-kick-higher-role: "<red>You cannot kick a member with a higher role than yours.</red>"
    cannot-kick-oneself: "<red>You cannot kick yourself.</red>"
    cancelled: "<red>Kick was cancelled by an external plugin.</red>"

  transfer:
    success: "<gradient:#00e676:#1de9b6>Clan ownership has been transferred to</gradient> <gold><bold>{target}</bold></gold>."
    received: "<gradient:#ffd54f:#ffb300>You are now the</gradient> <gold><bold>owner</bold></gold> <gradient:#ffd54f:#ffb300>of</gradient> <gold><bold>{clan}</bold></gold>."
    broadcast: "<gold><bold>{target}</bold></gold> <yellow>is now the clan owner.</yellow>"
    not-in-clan: "<red>You are not in a <bold>clan</bold>.</red>"
    target-not-in-clan: "<gold><bold>{target}</bold></gold> <red>is not in your clan.</red>"
    insufficient-role: "<red>You don't have permission to transfer ownership.</red>"
    target-is-already-owner: "<gold><bold>{target}</bold></gold> <red>is already the clan owner.</red>"
    cancelled: "<red>Ownership transfer was cancelled by an external plugin.</red>"

  promote:
    success: "<gradient:#00e676:#1de9b6>{target} has been promoted to {role}.</gradient>"
    received: "<gradient:#00e676:#1de9b6>You have been promoted to {role}.</gradient>"
    broadcast: "<gold><bold>{target}</bold></gold> <gradient:#00e676:#1de9b6>has been promoted to {role}.</gradient>"
    not-in-clan: "<red>You are not in a <bold>clan</bold>.</red>"
    target-not-in-clan: "<gold><bold>{target}</bold></gold> <red>is not in your clan.</red>"
    insufficient-role: "<red>You don't have permission to promote members.</red>"
    cannot-promote-higher-or-equal-role: "<red>You cannot promote a member with a higher or equal role than yours.</red>"
    cannot-promote-to-higher-role: "<red>You cannot promote a member to a role higher or equal than yours.</red>"
    already-max-role: "<gold><bold>{target}</bold></gold> <red>is already at the maximum role.</red>"
    cannot-promote-oneself: "<red>You cannot promote yourself.</red>"
    cancelled: "<red>Promotion was cancelled by an external plugin.</red>"

  display:
    success: "<green>Display name updated to {new_display}.</green>"
    not-in-clan: "<red>You are not in a clan.</red>"
    invalid-content: "<red>Display name content does not match the original clan name.</red>"
    invalid-characters: "<red>Display name contains <bold>invalid characters</bold>.</red>"
    invalid-format: "<red>Display name contains <bold>invalid formatting</bold>.</red>"
    insufficient-role: "<red>You don't have permission to change the clan display name.</red>"

  demote:
    success: "<gradient:#ff5252:#ff1744>{target} has been demoted to {role}.</gradient>"
    received: "<gradient:#ff5252:#ff1744>You have been demoted to {role}.</gradient>"
    broadcast: "<gold><bold>{target}</bold></gold> <gradient:#ff5252:#ff1744>has been demoted to {role}.</gradient>"
    not-in-clan: "<red>You are not in a <bold>clan</bold>.</red>"
    target-not-in-clan: "<gold><bold>{target}</bold></gold> <red>is not in your clan.</red>"
    insufficient-role: "<red>You don't have permission to demote members.</red>"
    cannot-demote-higher-or-equal-role: "<red>You cannot demote a member with a higher or equal role than yours.</red>"
    already-min-role: "<gold><bold>{target}</bold></gold> <red>is already at the minimum role.</red>"
    cannot-demote-oneself: "<red>You cannot demote yourself.</red>"
    cancelled: "<red>Demotion was cancelled by an external plugin.</red>"

  chat:
    invalid-mode: "<red>That chat mode <bold>does not exist</bold>.</red>"
    already-in-mode: "<red>You are already in that chat mode.</red>"
    insufficient-online-members: "<red>There are not enough <bold>online clan members</bold>.</red>"
    insufficient-online-allies: "<red>There are not enough <bold>online clan allies</bold>.</red>"
    clan:
      switched: "<gradient:gold:yellow>You are now chatting in <bold>clan chat</bold>.</gradient>"
      switched-back: "<yellow>You are now chatting in <bold>public chat</bold>.</yellow>"
      not-in-clan: "<red>You are not in a <bold>clan</bold>.</red>"

  diplomacy:
    not-in-clan: "<red>You are not in a <bold>clan</bold>.</red>"
    no-permission: "<red>You don't have permission to manage diplomacy.</red>"
    target-not-found: "<red>That clan was not found.</red>"

    ally:
      send:
        success: "<gradient:#00e676:#1de9b6>Alliance request sent to</gradient> <gold><bold>{clan}</bold></gold>."
        broadcast: "<gold><bold>{player}</bold></gold> <yellow>sent an alliance request to</yellow> <gold><bold>{clan}</bold></gold>."
        received: "<gold><bold>{player}</bold></gold> <yellow>from</yellow> <gold><bold>{clan}</bold></gold> <yellow>sent you an alliance request.</yellow> <green>/clan ally accept</green> <gray>|</gray> <red>/clan ally decline</red>"

        same-clan: "<red>You cannot send an alliance request to your own clan.</red>"
        already-allies: "<gold><bold>{clan}</bold></gold> <red>is already your ally.</red>"
        already-requested: "<red>You already have a pending alliance request with <gold><bold>{clan}</bold></gold>.</red>"
        in-tension: "<red>You cannot ally a clan you are in tension with.</red>"
        is-enemy: "<gold><bold>{clan}</bold></gold> <red>is your enemy. Remove them first.</red>"
        target-has-clan-as-enemy: "<gold><bold>{clan}</bold></gold> <red>has marked your clan as enemy.</red>"
        insufficient-role: "<red>You don't have permission to manage diplomacy.</red>"
        cancelled: "<red>Alliance request was cancelled by an external plugin.</red>"

      accept:
        success: "<gradient:#00e676:#1de9b6>Alliance accepted!</gradient>"
        broadcast: "<gradient:#00e676:#1de9b6>Your clan is now allied with</gradient> <gold><bold>{clan}</bold></gold>."
        notified: "<gradient:#00e676:#1de9b6>Your clan is now allied with</gradient> <gold><bold>{clan}</bold></gold>."

        not-requested: "<red>You don't have a pending alliance request.</red>"
        target-clan-offline: "<red>The clan that sent the request is no longer online.</red>"
        cancelled: "<red>Alliance accept was cancelled by an external plugin.</red>"

      decline:
        success: "<yellow>Alliance request declined.</yellow>"
        broadcast: "<yellow>Alliance request from <gold><bold>{clan}</bold></gold> was declined.</yellow>"
        notified: "<gold><bold>{player}</bold></gold> <red>declined your alliance request.</red>"

        not-requested: "<red>You don't have a pending alliance request.</red>"

      remove:
        success: "<gradient:#ff5252:#ff1744>Alliance with</gradient> <gold><bold>{clan}</bold></gold> <gradient:#ff5252:#ff1744>has been removed.</gradient>"
        broadcast: "<gradient:#ff5252:#ff1744>Your alliance with</gradient> <gold><bold>{clan}</bold></gold> <gradient:#ff5252:#ff1744>has been removed.</gradient>"
        notified: "<gradient:#ff5252:#ff1744>Your alliance with</gradient> <gold><bold>{clan}</bold></gold> <gradient:#ff5252:#ff1744>has been removed.</gradient>"

        same-clan: "<red>You cannot do that with your own clan.</red>"
        not-allies: "<gold><bold>{clan}</bold></gold> <red>is not your ally.</red>"
        cancelled: "<red>Alliance removal was cancelled by an external plugin.</red>"

    enemy:
      add:
        success: "<gold><bold>{clan}</bold></gold> <red>has been marked as enemy.</red>"
        broadcast: "<gold><bold>{clan}</bold></gold> <red>has been marked as enemy.</red>"
        notified: "<red>Your clan has been marked as enemy by</red> <gold><bold>{clan}</bold></gold>."

        same-clan: "<red>You cannot do that with your own clan.</red>"
        already-enemies: "<gold><bold>{clan}</bold></gold> <red>is already your enemy.</red>"
        is-ally: "<gold><bold>{clan}</bold></gold> <red>is your ally. Remove the alliance first.</red>"
        in-tension: "<red>You cannot mark a clan you are in tension with as enemy.</red>"
        cancelled: "<red>Enemy add was cancelled by an external plugin.</red>"

      remove:
        success: "<gradient:#00e676:#1de9b6>Removed</gradient> <gold><bold>{clan}</bold></gold> <gradient:#00e676:#1de9b6>from enemies.</gradient>"
        broadcast: "<gradient:#00e676:#1de9b6>Your clan is no longer enemies with</gradient> <gold><bold>{clan}</bold></gold>."
        notified: "<gradient:#00e676:#1de9b6>Your clan is no longer enemies with</gradient> <gold><bold>{clan}</bold></gold>."

        same-clan: "<red>You cannot do that with your own clan.</red>"
        not-enemies: "<gold><bold>{clan}</bold></gold> <red>is not your enemy.</red>"
        cancelled: "<red>Enemy removal was cancelled by an external plugin.</red>"

invite:
  send:
    success: "<gradient:#00e676:#1de9b6>Invite sent to</gradient> <gold><bold>{target}</bold></gold>."
    received: "<gold><bold>{player}</bold></gold> <yellow>invited you to join</yellow> <gold><bold>{clan}</bold></gold>. <green>/clan accept</green> <gray>|</gray> <red>/clan decline</red>"
    not-in-clan: "<red>You are not in a <bold>clan</bold>.</red>"
    already-in-clan: "<gold><bold>{target}</bold></gold> <red>is already in a clan.</red>"
    already-invited: "<gold><bold>{target}</bold></gold> <red>already has a pending invite.</red>"
    clan-full: "<red>Your clan is full.</red>"
    insufficient-role: "<red>You don't have permission to invite members.</red>"
    target-offline: "<gold><bold>{target}</bold></gold> <red>is not online.</red>"
    cannot-invited-oneself: "<red>You cannot invite yourself.</red>"
    cancelled: "<red>Invite was cancelled by an external plugin.</red>"

  accept:
    success: "<gradient:#00e676:#1de9b6>You joined</gradient> <gold><bold>{clan}</bold></gold>!"
    broadcast: "<gold><bold>{player}</bold></gold> <gradient:#00e676:#1de9b6>has joined the clan.</gradient>"
    no-pending-invite: "<red>You don't have a pending invite.</red>"
    already-in-clan: "<red>You are already in a clan.</red>"
    clan-full: "<red>That clan is full.</red>"
    cancelled: "<red>Invite accept was cancelled by an external plugin.</red>"

  decline:
    success: "<yellow>You declined the invite from <gold><bold>{clan}</bold></gold>.</yellow>"
    notified: "<gold><bold>{player}</bold></gold> <red>declined your clan invite.</red>"
    no-pending-invite: "<red>You don't have a pending invite.</red>"